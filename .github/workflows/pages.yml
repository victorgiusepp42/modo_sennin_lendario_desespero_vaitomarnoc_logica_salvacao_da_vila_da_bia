name: Deploy GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm install --no-audit --no-fund
      - run: npm run build

      - name: Prepare site
        run: |
          mkdir -p _site
          cp dist/*.html _site/
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <meta charset="utf-8"/>
          <meta http-equiv="refresh" content="0; url=modo_sennin_lendario_desespero_vaitomarnoc_logica_salvacao_da_vila_da_bia.html"/>
          <title>Material — Lógica para IA</title>
          <p><a href="modo_sennin_lendario_desespero_vaitomarnoc_logica_salvacao_da_vila_da_bia.html">Abrir material</a></p>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
